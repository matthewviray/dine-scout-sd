version: 2

models:
  - name: stg_restaurants
    description: "Cleaned restaurant data from Google Places API"
    columns:
      - name: place_id
        description: "Unique identifier for each restaurant from Google Places API"
        tests:
          - unique
          - not_null
      - name: name
        description: "Name of the restaurant"
        tests:
          - not_null
      - name: rating
        tests:
          - not_null
      - name: review_count
        tests:
          - not_null
      - name: neighborhood
        tests:
          - not_null

  - name: stg_cdc_events
    description: "Cleaned CDC events with parsed rating values from JSON"
    columns:
        - name: event_id
          description: "Unique event identifier auto-generated by Snowflake"
          tests:
            - not_null
            - unique
        - name: place_id
          tests:
            - not_null
        - name: change_type
          tests:
            - not_null
            - accepted_values:
                values: 
                  - insert
                  - update
        - name: detected_at
          tests:
            - not_null